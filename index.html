<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 20px; text-align: center; background: #111; font-size: 1.5rem; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; }
        .msg { margin: 10px 0; padding: 12px; border-radius: 10px; max-width: 80%; }
        .user { background: #ff0055; align-self: flex-end; margin-left: auto; }
        .ai { background: #1f1f1f; }
        .input-area { padding: 15px; background: #111; }
        input { width: 80%; padding: 15px; }
        button { padding: 15px 25px; background: #ff0055; border: none; color: white; }
    </style>
</head>
<body>
    <div class="header">NEXUS AI</div>
    <div id="chat"></div>
    
    <div class="input-area">
        <input type="text" id="in" placeholder="Mesaj yaz...">
        <button onclick="send()">Gönder</button>
    </div>

    <script>
        const token = "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";
        const chat = document.getElementById("chat");
        const input = document.getElementById("in");

        function addMsg(text, type) {
            const div = document.createElement("div");
            div.className = `msg ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, "user");
            input.value = "";

            const loading = document.createElement("div");
            loading.className = "msg ai";
            loading.textContent = "Düşünüyor...";
            chat.appendChild(loading);

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/microsoft/Phi-3-mini-4k-instruct", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ inputs: text, parameters: { max_new_tokens: 500 } })
                });

                if (!response.ok) throw new Error("API hatası");

                const data = await response.json();
                loading.remove();
                addMsg(data[0]?.generated_text || "Cevap yok", "ai");
            } catch (err) {
                loading.remove();
                addMsg("Hata: " + err.message, "ai");
                console.error(err);
            }
        }

        input.addEventListener("keypress", e => { if (e.key === "Enter") send(); });
    </script>
</body>
</html>
