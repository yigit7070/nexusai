<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | Premium</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 20px; font-weight: bold; font-size: 1.6rem; text-align: center; background: #111; border-bottom: 3px solid #ff0055; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .msg { padding: 14px 18px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
        .ai { background: #1a1a1a; border-left: 5px solid #ff0055; align-self: flex-start; }
        .user { background: #ff0055; color: white; align-self: flex-end; }
        .input-area { padding: 20px; background: #111; border-top: 1px solid #333; }
        .input-box { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
        input { flex: 1; padding: 16px; background: #000; border: 1px solid #ff0055; color: #fff; border-radius: 8px; font-size: 1.05rem; }
        button { padding: 0 28px; background: #ff0055; border: none; color: #fff; cursor: pointer; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">NEXUS AI • Phi-3 Mini</div>
    <div id="chat">
        <div class="msg ai">Merhaba! Mesaj yazmaya başlayabilirsin.</div>
    </div>
    
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="in" placeholder="Mesajınızı yazın...">
            <button id="btn">GÖNDER</button>
        </div>
    </div>

    <script>
        const token = "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";

        const chat = document.getElementById("chat");
        const input = document.getElementById("in");
        const btn = document.getElementById("btn");

        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = `msg ${type}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = async () => {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";

            const loading = document.createElement("div");
            loading.className = "msg ai";
            loading.textContent = "Düşünüyor...";
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("https://api-inference.huggingface.co/models/microsoft/Phi-3-mini-4k-instruct", {
                    headers: { 
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json" 
                    },
                    method: "POST",
                    body: JSON.stringify({
                        inputs: text,
                        parameters: { 
                            max_new_tokens: 800, 
                            temperature: 0.7,
                            top_p: 0.9,
                            return_full_text: false
                        }
                    })
                });

                const data = await res.json();
                loading.remove();

                if (data.error) {
                    addMessage("Hata: " + data.error, "ai");
                } else {
                    let cevap = data[0]?.generated_text || "Cevap yok";
                    addMessage(cevap.trim(), "ai");
                }
            } catch (e) {
                loading.remove();
                addMessage("Hata: " + e.message, "ai");
            }
        };

        input.addEventListener("keypress", e => { if (e.key === "Enter") btn.click(); });
    </script>
</body>
</html>
