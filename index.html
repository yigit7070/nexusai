<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            background: linear-gradient(135deg, #0f0f1e 0%, #1a0033 100%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 20px 30px;
            font-weight: 600;
            font-size: 1.5rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 0, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header::before {
            content: "✦";
            color: #ff00ff;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .msg {
            padding: 16px 22px;
            border-radius: 20px;
            max-width: 80%;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .ai {
            background: rgba(255, 255, 255, 0.08);
            border-left: 5px solid #ff00ff;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }
        .user {
            background: linear-gradient(135deg, #ff00ff, #9f00ff);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .input-area {
            padding: 25px 30px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 0, 255, 0.2);
        }
        .input-box {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 0, 255, 0.3);
            color: #fff;
            border-radius: 50px;
            font-size: 1.05rem;
            outline: none;
        }
        input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 0 3px rgba(255, 0, 255, 0.2);
        }
        button {
            padding: 0 32px;
            background: linear-gradient(135deg, #ff00ff, #9f00ff);
            border: none;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 0, 255, 0.4);
        }
        .image { max-width: 100%; border-radius: 15px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">NEXUS AI</div>
    <div id="chat">
        <div class="msg ai">Merhaba! Ben Nexus. Nasıl yardımcı olabilirim?</div>
    </div>
    
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="in" placeholder="Mesaj yazın veya resim isteyin...">
            <button id="btn">Gönder</button>
        </div>
    </div>

    <script>
        const token = "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";

        const chat = document.getElementById("chat");
        const input = document.getElementById("in");
        const btn = document.getElementById("btn");

        function addMessage(text, type, img = null) {
            const div = document.createElement("div");
            div.className = `msg ${type}`;
            if (img) {
                div.innerHTML = text + `<br><img src="${img}" class="image">`;
            } else {
                div.innerHTML = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = async () => {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";

            const loading = document.createElement("div");
            loading.className = "msg ai";
            loading.textContent = "Düşünüyor...";
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [
                            { role: "system", content: "Sen Nexus AI'sin. Zeki, samimi ve yardımcı bir asistansın. Türkçe cevap ver." },
                            { role: "user", content: text }
                        ],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });

                const data = await res.json();
                loading.remove();
                addMessage(data.choices[0].message.content, "ai");
            } catch (e) {
                loading.remove();
                addMessage("Bir hata oluştu. Tekrar dene.", "ai");
            }
        };

        input.addEventListener("keypress", e => { if (e.key === "Enter") btn.click(); });
    </script>
</body>
</html>
