<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | Premium</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 20px; font-weight: bold; font-size: 1.6rem; text-align: center; background: #111; border-bottom: 3px solid #ff0055; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .msg { padding: 14px 18px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
        .ai { background: #1a1a1a; border-left: 5px solid #ff0055; align-self: flex-start; }
        .user { background: #ff0055; color: white; align-self: flex-end; }
        .input-area { padding: 20px; background: #111; border-top: 1px solid #333; }
        .input-box { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
        input { flex: 1; padding: 16px; background: #000; border: 1px solid #ff0055; color: #fff; border-radius: 8px; font-size: 1.05rem; }
        button { padding: 0 28px; background: #ff0055; border: none; color: #fff; cursor: pointer; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header">NEXUS AI • Groq</div>
    <div id="chat">
        <div class="msg ai">Groq token'ını girerek başlayın (gsk_ ile başlayan)</div>
    </div>
    
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="in" placeholder="Token veya mesaj...">
            <button id="btn">GÖNDER</button>
        </div>
    </div>

    <script>
        let token = localStorage.getItem("groq_token") || "";

        const chat = document.getElementById("chat");
        const input = document.getElementById("in");
        const btn = document.getElementById("btn");

        function addMessage(text, type) {
            const div = document.createElement("div");
            div.className = `msg ${type}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        btn.onclick = async () => {
            let text = input.value.trim();
            if (!text) return;

            // Token girme kısmı
            if (!token) {
                if (text.startsWith("gsk_")) {
                    localStorage.setItem("groq_token", text);
                    token = text;
                    addMessage("✅ Token başarıyla kaydedildi! Artık sohbet edebiliriz.", "ai");
                    input.value = "";
                    return;
                } else {
                    addMessage("❌ Lütfen gsk_ ile başlayan Groq token girin.", "ai");
                    return;
                }
            }

            // Normal sohbet
            addMessage(text, "user");
            input.value = "";

            const loading = document.createElement("div");
            loading.className = "msg ai";
            loading.textContent = "Düşünüyor...";
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: text }],
                        temperature: 0.7,
                        max_tokens: 900
                    })
                });

                const data = await res.json();
                loading.remove();

                if (data.error) {
                    addMessage("Hata: " + data.error.message, "ai");
                } else {
                    addMessage(data.choices[0].message.content, "ai");
                }
            } catch (e) {
                loading.remove();
                addMessage("Hata: " + e.message, "ai");
            }
        };

        input.addEventListener("keypress", e => { if (e.key === "Enter") btn.click(); });
    </script>
</body>
</html>
