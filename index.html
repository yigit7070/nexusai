<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@huggingface/inference@2.6.4/dist/index.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 20px; font-weight: bold; font-size: 1.5rem; color: #fff; border-bottom: 2px solid #ff0055; text-align: center; text-transform: uppercase; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 5px; max-width: 80%; }
        .ai { background: #1a1a1a; border-left: 4px solid #ff0055; align-self: flex-start; }
        .user { background: #333; align-self: flex-end; }
        .input-area { padding: 20px; border-top: 1px solid #333; display: flex; justify-content: center; }
        .input-box { width: 100%; max-width: 600px; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; background: #000; border: 1px solid #ff0055; color: #fff; border-radius: 3px; outline: none; }
        button { padding: 15px 25px; background: #ff0055; border: none; color: #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">NEXUS AI | PREMİUM</div>
    <div id="chat"><div class="msg ai">Token girin ve 'BAŞLAT'a basın.</div></div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="in" placeholder="Token veya mesaj...">
            <button id="btn" onclick="init()">BAŞLAT</button>
        </div>
    </div>

    <script>
        let hf;
        const btn = document.getElementById("btn");
        const input = document.getElementById("in");
        let token = localStorage.getItem("nexus_token") || "";

        if(token) { hf = new HfInference.HfInference(token); btn.innerText = "GÖNDER"; btn.onclick = send; }

        function init() {
            if(!token && input.value.startsWith("hf_")) {
                token = input.value;
                localStorage.setItem("nexus_token", token);
                hf = new HfInference.HfInference(token);
                btn.innerText = "GÖNDER"; btn.onclick = send;
                input.value = ""; input.placeholder = "Mesaj yaz...";
                alert("Bağlandı!");
            }
        }

        async function send() {
            const text = input.value;
            if(!text) return;
            document.getElementById("chat").innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            try {
                const res = await hf.textGeneration({ model: 'Qwen/Qwen2.5-7B-Instruct', inputs: text });
                document.getElementById("chat").innerHTML += `<div class="msg ai">${res.generated_text}</div>`;
            } catch(e) { document.getElementById("chat").innerHTML += `<div class="msg ai">Bağlantı Hatası: Token yanlış olabilir.</div>`; }
        }
    </script>
</body>
</html>
